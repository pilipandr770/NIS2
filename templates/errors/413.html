{% extends 'base.html' %}
{% block title %}413 — Anfrage zu groß{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="bi bi-file-earmark-x text-warning" style="font-size:4rem;"></i>
  <h2 class="mt-3">Anfrage zu groß (413)</h2>
  <p class="text-muted">
    Die übermittelten Daten überschreiten das zulässige Maximum von 2 MB.<br>
    Bitte reduzieren Sie die Datei- oder Feldgröße und versuchen Sie es erneut.
  </p>
  <a href="javascript:history.back()" class="btn btn-primary">Zurück</a>
</div>
{% endblock %}
