{% extends 'base.html' %}
{% block title %}Neues Passwort{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="text-center mb-4">
      <i class="bi bi-lock-fill text-primary" style="font-size:2.5rem;"></i>
      <h2 class="fw-700 mt-2">Neues Passwort</h2>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Neues Passwort</label>
            <input type="password" name="password" class="form-control" required minlength="8">
          </div>
          <div class="mb-3">
            <label class="form-label">Passwort bestatigen</label>
            <input type="password" name="password2" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Speichern</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
