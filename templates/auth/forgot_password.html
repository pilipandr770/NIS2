{% extends 'base.html' %}
{% block title %}Passwort vergessen{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="text-center mb-4">
      <i class="bi bi-key text-primary" style="font-size:2.5rem;"></i>
      <h2 class="fw-700 mt-2">Passwort zurücksetzen</h2>
    </div>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">E-Mail-Adresse</label>
            <input type="email" name="email" class="form-control" required autofocus placeholder="ihre@email.de">
          </div>
          <button type="submit" class="btn btn-primary w-100">Link anfordern</button>
        </form>
      </div>
    </div>
    <p class="text-center small mt-3"><a href="{{ url_for('auth.login') }}">Zuruck zur Anmeldung</a></p>
  </div>
</div>
{% endblock %}
